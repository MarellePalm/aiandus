<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Aiapäeviku rakenduse komponentdiagramm</title>
  <desc id="desc">Diagramm näitab Vue ja Inertia kliendipoolset kihti, Laraveli serveripoolset kihti, API-otspunkte, andmebaasi, vahemälu ja väliseid ilmaandmete teenuseid.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #dbe4ee; stroke-width: 2; }
      .lane-title { fill: #475569; font: 700 18px Arial, sans-serif; letter-spacing: 0; }
      .box { stroke-width: 2; rx: 14; filter: url(#softShadow); }
      .box-title { fill: #0f172a; font: 700 21px Arial, sans-serif; letter-spacing: 0; }
      .box-text { fill: #334155; font: 16px Arial, sans-serif; letter-spacing: 0; }
      .small-title { fill: #0f172a; font: 700 18px Arial, sans-serif; letter-spacing: 0; }
      .small-text { fill: #334155; font: 15px Arial, sans-serif; letter-spacing: 0; }
      .caption { fill: #64748b; font: 15px Arial, sans-serif; letter-spacing: 0; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>

  <text x="600" y="50" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="700">Aiapäeviku rakenduse arhitektuurikihid</text>
  <text x="600" y="80" text-anchor="middle" class="caption">Peamine suhtlus liigub Inertia kaudu; eraldi API-otspunkte kasutatakse sihitud teenusteks.</text>

  <rect x="60" y="115" width="1080" height="135" rx="18" class="lane"/>
  <text x="85" y="148" class="lane-title">Kliendikiht</text>

  <rect x="60" y="285" width="1080" height="185" rx="18" class="lane"/>
  <text x="85" y="318" class="lane-title">Rakenduse serverikiht</text>

  <rect x="60" y="505" width="1080" height="150" rx="18" class="lane"/>
  <text x="85" y="538" class="lane-title">Andmed ja välised teenused</text>

  <rect x="105" y="165" width="230" height="58" rx="14" fill="#e0f2fe" stroke="#38bdf8" class="box"/>
  <text x="220" y="189" text-anchor="middle" class="small-title">Brauser</text>
  <text x="220" y="211" text-anchor="middle" class="small-text">kasutaja sessioon</text>

  <rect x="430" y="145" width="300" height="90" rx="14" fill="#ecfdf5" stroke="#34d399" class="box"/>
  <text x="580" y="174" text-anchor="middle" class="box-title">Vue lehed</text>
  <text x="580" y="199" text-anchor="middle" class="box-text">taimed, peenrad, kalender,</text>
  <text x="580" y="220" text-anchor="middle" class="box-text">seemned ja töölauavaated</text>

  <rect x="835" y="154" width="230" height="72" rx="14" fill="#fff7ed" stroke="#fb923c" class="box"/>
  <text x="950" y="184" text-anchor="middle" class="small-title">PWA varad</text>
  <text x="950" y="207" text-anchor="middle" class="small-text">Vite build</text>

  <rect x="150" y="345" width="255" height="82" rx="14" fill="#fef3c7" stroke="#f59e0b" class="box"/>
  <text x="278" y="375" text-anchor="middle" class="box-title">Inertia.js</text>
  <text x="278" y="401" text-anchor="middle" class="box-text">lehevastused ja vormid</text>

  <rect x="485" y="328" width="275" height="116" rx="14" fill="#f1f5f9" stroke="#94a3b8" class="box"/>
  <text x="623" y="358" text-anchor="middle" class="box-title">Laravel</text>
  <text x="623" y="384" text-anchor="middle" class="box-text">marsruudid, kontrollerid,</text>
  <text x="623" y="405" text-anchor="middle" class="box-text">autentimine ja valideerimine</text>
  <text x="623" y="426" text-anchor="middle" class="box-text">Eloquent mudelid</text>

  <rect x="845" y="330" width="235" height="112" rx="14" fill="#eef2ff" stroke="#818cf8" class="box"/>
  <text x="963" y="360" text-anchor="middle" class="box-title">API-otspunktid</text>
  <text x="963" y="386" text-anchor="middle" class="box-text">/api/weather</text>
  <text x="963" y="407" text-anchor="middle" class="box-text">/api/health</text>
  <text x="963" y="428" text-anchor="middle" class="box-text">tehnilised teenused</text>

  <rect x="145" y="565" width="245" height="62" rx="14" fill="#fce7f3" stroke="#f472b6" class="box"/>
  <text x="268" y="590" text-anchor="middle" class="small-title">MySQL / SQLite</text>
  <text x="268" y="613" text-anchor="middle" class="small-text">rakenduse põhiandmed</text>

  <rect x="485" y="565" width="245" height="62" rx="14" fill="#ede9fe" stroke="#a78bfa" class="box"/>
  <text x="608" y="590" text-anchor="middle" class="small-title">Laravel cache</text>
  <text x="608" y="613" text-anchor="middle" class="small-text">ilmapäringute vahemälu</text>

  <rect x="825" y="550" width="275" height="90" rx="14" fill="#dcfce7" stroke="#22c55e" class="box"/>
  <text x="963" y="580" text-anchor="middle" class="small-title">Välised ilmaandmed</text>
  <text x="963" y="604" text-anchor="middle" class="small-text">OpenWeatherMap</text>
  <text x="963" y="626" text-anchor="middle" class="small-text">WeatherAPI valikuliselt</text>

  <path class="arrow" d="M335 194 H430"/>
  <path class="arrow" d="M580 235 C580 280 395 295 305 345"/>
  <path class="arrow" d="M405 386 H485"/>
  <path class="arrow" d="M760 386 H845"/>
  <path class="arrow" d="M585 444 C550 485 365 525 285 565"/>
  <path class="arrow" d="M655 444 C690 490 650 523 615 565"/>
  <path class="arrow" d="M963 442 V550"/>
  <path class="arrow dashed" d="M730 190 H835"/>

  <text x="397" y="183" text-anchor="middle" class="caption">UI</text>
  <text x="452" y="325" text-anchor="middle" class="caption">Inertia request/response</text>
  <text x="803" y="374" text-anchor="middle" class="caption">JSON</text>
  <text x="416" y="529" text-anchor="middle" class="caption">Eloquent</text>
  <text x="728" y="535" text-anchor="middle" class="caption">Cache::remember</text>
  <text x="1012" y="500" text-anchor="middle" class="caption">HTTP päringud</text>
</svg>
