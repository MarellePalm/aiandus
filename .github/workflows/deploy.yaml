name: Production deploy

on: workflow_dispatch

concurrency: production_environment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Unlock stale deploy lock
        uses: deployphp/action@v1
        continue-on-error: true
        with:
          deployer-version: "7.5.12"
          dep: deploy:unlock stage
          private-key: ${{ secrets.PRIVATE_KEY }}
          known-hosts: |
            ta24palm.itmajakas.ee ssh-rsa 
            ta24palm.itmajakas.ee ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIApdOwYghRP94sIs+/3esOap0qZ0sea/AFdOVQIG/H6O
      - name: Deploy
        uses: deployphp/action@v1
        with:
          deployer-version: "7.5.12"
          # Hostinimi peab ühtima deploy.yaml hosts: võtmega (stage)
          dep: deploy stage -vvv
          private-key: ${{ secrets.PRIVATE_KEY }}
          known-hosts: |
            ta24palm.itmajakas.ee ssh-rsa 
            ta24palm.itmajakas.ee ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIApdOwYghRP94sIs+/3esOap0qZ0sea/AFdOVQIG/H6O